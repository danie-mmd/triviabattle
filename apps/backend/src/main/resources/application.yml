spring:
  application:
    name: trivia-battle

  # ── MySQL ─────────────────────────────────────────────────
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/triviabattle?useSSL=false&allowPublicKeyRetrieval=true}
    username: ${MYSQL_USERNAME:trivia}
    password: ${MYSQL_PASSWORD:trivia_pass}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true

  # ── Flyway ────────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    repair-on-migrate: true

  # ── Redis ─────────────────────────────────────────────────
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  # ── Jackson ───────────────────────────────────────────────
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

# ── Server ──────────────────────────────────────────────────
server:
  port: ${PORT:8080}

# ── App Config ─────────────────────────────────────────────
app:
  bot-token: ${BOT_TOKEN}
  jwt:
    secret: ${JWT_SECRET:change_me_in_production_32_chars!!}
    expiry-ms: ${JWT_EXPIRY_MS:86400000}
  gemini:
    api-key: ${TRIVIA_GEMINI_API_KEY:}
    model: gemini-2.5-flash
  ton:
    authorized-wallet: ${TON_AUTHORIZED_WALLET:}
    network: ${TON_NETWORK:testnet}
  game:
    room-size: ${ROOM_SIZE:5}
    question-count: 10
    question-time-seconds: 20
    intermission-seconds: 3
    entry-fee-ton: 1.0

# ── Scheduling ──────────────────────────────────────────────
scheduling:
  enabled: true

# ── Logging ─────────────────────────────────────────────────
logging:
  level:
    za.co.triviabattle: DEBUG
    org.springframework.web.reactive: INFO

# ── Management ──────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always
